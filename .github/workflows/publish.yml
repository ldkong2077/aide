name: Publish to npm (Trusted Publishing / OIDC)

# 触发: 推送版本标签时发布, 例如 `git push origin v2.1.1`
# 也可在 GitHub Actions 页面手动触发 (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 关键权限: id-token: write 用于向 npm 申请 OIDC 令牌 (无需长期有效的 NPM_TOKEN)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          # 注意: 这里不要设置 token。OIDC 可信发布由 id-token: write 自动提供,
          # npm publish 会使用 GitHub 下发的临时令牌, 无需 NPM_TOKEN 密钥。

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (prepublishOnly 也会再构建一次)
        run: npm run build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@aide-dev/aide@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@aide-dev/aide@$VERSION 已存在于 npm，跳过发布（仅验证构建/测试）"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@aide-dev/aide@$VERSION 未发布，将走 OIDC 可信发布"
          fi

      - name: Publish with provenance (OIDC)
        if: steps.check.outputs.exists != 'true'
        run: npm publish --provenance --access public
        # 不使用 NODE_AUTH_TOKEN / NPM_TOKEN: Trusted Publishing 自动用 OIDC 身份发布
